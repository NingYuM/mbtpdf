name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Format check
        run: moon fmt --check

      - name: Test
        run: moon test

      - name: Check
        run: moon check

      - name: Coverage gate (>= 95%)
        run: |
          chmod +x scripts/coverage_gate.sh
          scripts/coverage_gate.sh --threshold 95
